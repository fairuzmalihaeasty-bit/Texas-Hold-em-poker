<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Texas Hold'em Demo UI</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; max-width:900px; margin:20px auto; }
      textarea, input { width:100%; padding:8px; box-sizing:border-box }
      .col { display:flex; gap:8px }
      .col > div { flex:1 }
      pre { background:#f5f5f5; padding:10px }
    </style>
  </head>
  <body>
    <h1>Texas Hold'em API Demo</h1>
    <p>Use these simple forms to call the deployed API endpoints.</p>

    <h2>Evaluate</h2>
    <div>
      <label>Hole (comma-separated, e.g. As,Kd)</label>
      <input id="evalHole" value="As,Kd" />
      <label>Community (comma-separated)</label>
      <input id="evalCommunity" value="2d,7c,Jd" />
      <button id="btnEval">Evaluate</button>
      <pre id="evalOut"></pre>
    </div>

    <h2>Compare</h2>
    <div class="col">
      <div>
        <label>Hand1 Hole</label>
        <input id="c1h" value="As,Ah" />
        <label>Hand1 Community</label>
        <input id="c1c" value="Kd,Qd,Jd,2s,3c" />
      </div>
      <div>
        <label>Hand2 Hole</label>
        <input id="c2h" value="Ks,Kh" />
        <label>Hand2 Community</label>
        <input id="c2c" value="Kd,Qd,Jd,2s,3c" />
      </div>
    </div>
    <button id="btnCompare">Compare</button>
    <pre id="compareOut"></pre>

    <h2>Simulate</h2>
    <label>Hero Hole</label>
    <input id="simHero" value="As,Kd" />
    <label>Known Community</label>
    <input id="simComm" value="2d,7c,Jd" />
    <label>Players</label>
    <input id="simPlayers" value="2" />
    <label>Iterations</label>
    <input id="simIter" value="1000" />
    <button id="btnSim">Simulate</button>
    <pre id="simOut"></pre>

    <script src="/web/app.js"></script>
  </body>
</html>
